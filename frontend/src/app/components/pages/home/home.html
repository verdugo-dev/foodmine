
<app-search></app-search>

<app-tags></app-tags>

<ul>
  @for (food of foods; track food.id) {
    <li>
      <a routerLink="/food/{{ food.id }}">
        <img [src]="food.imageUrl" [alt]="food.name">
        <div class="content">
          <div class="name">
            {{ food.name }}
          </div>
          <span class="favorite {{food.favorite ? '' : 'not'}}">❤︎</span>

          <div class="stars">
            <star-rating [value]="food.stars" [totalstars]="5" checkedcolor="red" uncheckedcolor="black" size="22px" [readonly]="true"></star-rating>
          </div>

          <div class="product-item-footer">
            <div class="origins">
              @for (origin of food.origins; track $index) {
                <span class="origin">{{ origin }}</span>
              }
            </div>

            <div class="cook-time">
              <span>⏰</span>
              {{ food.cookTime}}
            </div>

            <div class="price">
              {{ food.price | currency }}
            </div>

          </div>

        </div>
      </a>
    </li>
  }
</ul>
